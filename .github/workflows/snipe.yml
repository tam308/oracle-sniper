name: Oracle ARM Sniper

# Runs on a schedule AND can be triggered manually from the Actions tab.
on:
  schedule:
    # Every 10 minutes (GitHub's practical minimum). Public repos get unlimited
    # free Actions minutes, so we snipe aggressively. GitHub may still delay or
    # skip individual scheduled runs -- that's fine, each run is self-contained.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# If a previous run is still going, don't pile a second one on top.
concurrency:
  group: oracle-sniper
  cancel-in-progress: false

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCI SDK
        run: pip install oci

      - name: Run sniper burst
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
          # End each run after ~9 min so the job finishes and the cron starts a
          # fresh one. Unlimited minutes on public, so we run near-continuously.
          MAX_RUNTIME_SECONDS: "540"
          # Stream print() output live instead of buffering it until exit.
          PYTHONUNBUFFERED: "1"
          # Phone push on success via ntfy.sh.
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
        run: python -u oracle_loop.py
