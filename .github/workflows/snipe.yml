name: Oracle ARM Sniper

# Runs on a schedule AND can be triggered manually from the Actions tab.
on:
  schedule:
    # Every 8 hours (3 runs/day). Private repos only get 2,000 free
    # Actions-minutes/month (~66/day), so we run a few long bursts instead of
    # constant short ones: 3 x ~20 min = ~60 min/day, ~1,800/month -> under cap.
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

# If a previous run is still going, don't pile a second one on top.
concurrency:
  group: oracle-sniper
  cancel-in-progress: false

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCI SDK
        run: pip install oci

      - name: Run sniper burst
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
          # ~19 min of sniping per run (3 runs/day x 8h cron = ~60 min/day,
          # ~1,800/month -> under the 2,000 private-repo free cap).
          MAX_RUNTIME_SECONDS: "1140"
          # Stream print() output live instead of buffering it until exit.
          PYTHONUNBUFFERED: "1"
          # Phone push on success via ntfy.sh.
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
        run: python -u oracle_loop.py
